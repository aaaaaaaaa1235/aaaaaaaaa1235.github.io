<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        h1 {
            color: #0066cc;
        }
        #countdown {
            font-size: 2em;
            margin: 20px 0;
        }
        .time {
            display: inline-block;
            margin: 0 10px;
            padding: 10px;
            background-color: #0066cc;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cuenta Regresiva</h1>
        <p>Faltan para el 28 de junio de 2026:</p>
        <div id="countdown">
            <span id="days" class="time">00</span> días,
            <span id="hours" class="time">00</span> horas,
            <span id="minutes" class="time">00</span> minutos,
            <span id="seconds" class="time">00</span> segundos.
        </div>
    </div>

    <script>
        // Fecha objetivo: 28 de junio de 2026
        const targetDate = new Date("Jun 28, 2026 00:00:00").getTime();

        // Actualiza la cuenta regresiva cada segundo
        const countdown = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Calcula días, horas, minutos y segundos
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Muestra el resultado
            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            // Si la cuenta regresiva termina
            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("countdown").innerHTML = "¡Llegó el 28 de junio!";
            }
        }, 1000);
    </script>
</body>
</html>
